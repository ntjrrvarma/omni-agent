version: '3.8'

services:
  # The Relational Brain (Live Data & Chat History)
  postgres:
    image: postgres:15-alpine
    container_name: omni_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: omnidb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d omnidb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The Vector Brain (PDF Embeddings)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: omni_qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # The AI Engine (LangChain Agent)
  backend:
    build: ./backend
    container_name: omni_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  # The User Interface (Streamlit)
  frontend:
    build: ./frontend
    container_name: omni_frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data: