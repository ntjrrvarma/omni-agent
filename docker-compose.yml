version: '3.8'

services:
  # The Relational Brain (Live Data & Chat History)
  postgres:
    image: postgres:15-alpine
    container_name: omni_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: omnidb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d omnidb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The Vector Brain (PDF Embeddings)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: omni_qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data: